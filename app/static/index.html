<!DOCTYPE html>
<html>
<head>
    <title>Task Manager</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0b1020;
            overflow: hidden;
            color: #e5e7eb;
        }

        /* floating hearts background layer */
        .hearts {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
            pointer-events: none;
        }

        .heart {
            position: absolute;
            bottom: -20px;
            color: rgba(255, 182, 193, 0.35);
            font-size: 18px;
            animation: floatUp linear infinite;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(0) scale(1);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            100% {
                transform: translateY(-110vh) scale(1.3);
                opacity: 0;
            }
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 600px;
            margin: 60px auto;
            background: rgba(17, 24, 39, 0.92);
            padding: 20px;
            border-radius: 14px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            backdrop-filter: blur(6px);
        }

        h1 {
            color: #fbcfe8;
        }

        .input-row {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input {
            flex: 1;
            padding: 10px;
            border-radius: 10px;
            border: 1px solid #374151;
            background: #0f172a;
            color: #e5e7eb;
        }

        button {
            border: none;
            padding: 10px 12px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
        }

        .add-btn {
            background: #f9a8d4;
            color: #1f2937;
        }

        .task {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 12px;
            border: 1px solid #1f2937;
        }

        .task.active {
            background: rgba(251, 207, 232, 0.08);
        }

        .task.done {
            background: rgba(148, 163, 184, 0.15);
            color: #94a3b8;
            text-decoration: line-through;
        }

        .btn-group {
            display: flex;
            gap: 6px;
        }

        .toggle-btn {
            background: #a78bfa;
            color: white;
        }

        .delete-btn {
            background: #fb7185;
            color: white;
        }

        .toggle-btn:hover,
        .delete-btn:hover,
        .add-btn:hover {
            opacity: 0.85;
        }
    </style>
</head>

<body>

<div class="hearts" id="hearts"></div>

<div class="container">
    <h1>Task Manager</h1>

    <div class="input-row">
        <input type="text" id="taskTitle" placeholder="Enter task...">
        <button class="add-btn" onclick="addTask()">Add</button>
    </div>

    <div id="tasks">Loading...</div>
</div>

<script>
const API_URL = '/api/v1/tasks';

/* create floating hearts */
function createHearts() {
    const container = document.getElementById("hearts");

    for (let i = 0; i < 25; i++) {
        const heart = document.createElement("div");
        heart.className = "heart";
        heart.innerHTML = "❤";

        heart.style.left = Math.random() * 100 + "vw";
        heart.style.animationDuration = (6 + Math.random() * 6) + "s";
        heart.style.fontSize = (12 + Math.random() * 18) + "px";
        heart.style.animationDelay = Math.random() * 5 + "s";

        container.appendChild(heart);
    }
}

async function fetchTasks() {
    const res = await fetch(API_URL);
    const tasks = await res.json();

    document.getElementById('tasks').innerHTML = tasks.map(t => `
        <div class="task ${t.completed ? 'done' : 'active'}">
            <div>${t.title}</div>

            <div class="btn-group">
                <button class="toggle-btn" onclick="toggleTask(${t.id}, ${t.completed})">
                    ${t.completed ? 'Undo' : 'Done'}
                </button>

                <button class="delete-btn" onclick="deleteTask(${t.id})">
                    Delete
                </button>
            </div>
        </div>
    `).join('');
}

async function addTask() {
    const input = document.getElementById('taskTitle');
    if (!input.value) return;

    await fetch(API_URL, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ title: input.value })
    });

    input.value = '';
    fetchTasks();
}

async function deleteTask(id) {
    await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
    fetchTasks();
}

async function toggleTask(id, current) {
    await fetch(`${API_URL}/${id}`, {
        method: 'PATCH',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ completed: !current })
    });

    fetchTasks();
}

createHearts();
fetchTasks();
</script>

</body>
</html>
